# =============================================================================
# Logstash Pipeline - CTI SOC Server (VPS B)
# =============================================================================
# Deskripsi : Pipeline untuk memproses, memperkaya (enrich), dan menganalisis
#             log dari honeypot VPS A. Pipeline ini melakukan:
#             1. Penerimaan log via Beats (Filebeat/Wazuh)
#             2. Pemetaan field ke standar ECS (Elastic Common Schema)
#             3. Pengayaan GeoIP untuk lokasi sumber serangan
#             4. Pemetaan MITRE ATT&CK (teknik dan taktik)
#             5. Klasifikasi Pyramid of Pain berdasarkan tipe IoC
#             6. Perhitungan threat score berdasarkan severity
#             7. Output ke Elasticsearch dan webhook SOAR
# =============================================================================

# =============================================================================
# BAGIAN INPUT
# =============================================================================
# Menerima log dari Beats agent (Filebeat, Wazuh Agent) yang berjalan di VPS A.
# Port 5044 adalah port standar untuk protokol Beats/Lumberjack.
# Host 0.0.0.0 berarti mendengarkan pada semua interface (termasuk tailscale0).
# Keamanan dijaga oleh firewall UFW yang hanya mengizinkan traffic via VPN.
# =============================================================================
input {
  beats {
    port => 5044
    host => "0.0.0.0"

    # Tag untuk identifikasi sumber log
    add_field => {
      "pipeline_source" => "cti-soc-pipeline"
      "environment" => "production"
    }
  }
}

# =============================================================================
# BAGIAN FILTER
# =============================================================================
# Filter memproses setiap event log yang masuk melalui beberapa tahapan:
# 1. Rename field -> standar ECS
# 2. GeoIP enrichment -> lokasi geografis penyerang
# 3. MITRE ATT&CK mapping -> teknik dan taktik serangan
# 4. Pyramid of Pain -> klasifikasi tingkat kesulitan IoC
# 5. Threat scoring -> skor ancaman berdasarkan severity
# 6. Parsing timestamp -> normalisasi waktu
# =============================================================================
filter {

  # ===========================================================================
  # TAHAP 1: Pemetaan Field ke ECS (Elastic Common Schema)
  # ===========================================================================
  # Mengganti nama field dari format log asli ke standar ECS.
  # ECS memastikan konsistensi data di seluruh Elastic Stack dan
  # memungkinkan integrasi dengan fitur bawaan Kibana (Maps, SIEM, dll).
  # ===========================================================================
  mutate {
    rename => {
      # --- Field Jaringan ---
      # IP sumber dan tujuan serangan
      "src_ip"        => "[source][ip]"
      "dest_ip"       => "[destination][ip]"

      # Port sumber dan tujuan
      "src_port"      => "[source][port]"
      "dest_port"     => "[destination][port]"

      # Protokol jaringan (TCP, UDP, ICMP, dll)
      "proto"         => "[network][transport]"

      # --- Field Alert/Event ---
      # Signature dari IDS (Suricata/Snort)
      "alert.signature"    => "[rule][name]"
      "alert.signature_id" => "[rule][id]"
      "alert.category"     => "[rule][category]"
      "alert.severity"     => "[event][severity]"

      # --- Field Host ---
      # Hostname sumber event
      "hostname"      => "[host][name]"
    }

    # Tambahkan tag untuk menandai bahwa field sudah di-rename
    add_tag => ["ecs_mapped"]
  }

  # ===========================================================================
  # TAHAP 2: Pengayaan GeoIP (Geolocation)
  # ===========================================================================
  # Menggunakan database GeoLite2-City (bawaan Logstash) untuk menentukan
  # lokasi geografis dari IP sumber serangan. Informasi ini sangat berguna
  # untuk visualisasi peta serangan di Kibana Maps.
  #
  # Data yang dihasilkan:
  # - Nama negara dan kode negara (country_name, country_code2)
  # - Nama kota (city_name)
  # - Koordinat latitude/longitude (location)
  # - Nama benua (continent_name)
  # - Autonomous System Number/ASN (untuk identifikasi ISP/organisasi)
  # ===========================================================================
  if [source][ip] {
    geoip {
      source => "[source][ip]"
      target => "[source][geo]"

      # Menggunakan database GeoLite2-City bawaan Logstash
      # Database di-update otomatis oleh Elasticsearch GeoIP downloader
      # Lokasi default: /usr/share/logstash/vendor/bundle/jruby/*/gems/logstash-filter-geoip-*/vendor/

      # Field yang diambil dari database GeoIP
      fields => [
        "city_name",
        "continent_name",
        "country_code2",
        "country_name",
        "location",
        "region_name",
        "timezone"
      ]
    }

    # Pengayaan ASN (Autonomous System Number)
    # Berguna untuk mengidentifikasi ISP atau organisasi penyerang
    geoip {
      source => "[source][ip]"
      target => "[source][as]"
      default_database_type => "ASN"
    }
  }

  # ===========================================================================
  # TAHAP 3: Pemetaan MITRE ATT&CK
  # ===========================================================================
  # Menerjemahkan alert.signature_id (rule ID dari Suricata/Snort) ke
  # framework MITRE ATT&CK. Pemetaan dilakukan menggunakan file dictionary
  # YAML yang berisi mapping antara rule ID dan teknik/taktik MITRE.
  #
  # Referensi MITRE ATT&CK: https://attack.mitre.org/
  #
  # Dua pemetaan yang dilakukan:
  # a) Rule ID -> Nama Teknik MITRE (mitre.technique_name)
  # b) Rule ID -> Taktik MITRE (mitre.tactic)
  # ===========================================================================

  # --- Pemetaan Nama Teknik MITRE ---
  # Contoh: rule ID "1000010" -> "Network Service Discovery"
  if [rule][id] {
    translate {
      field       => "[rule][id]"
      destination => "[mitre][technique_name]"
      dictionary_path => "/etc/logstash/dictionaries/mitre-name.yml"

      # Jika rule ID tidak ditemukan di dictionary, tetap lanjutkan
      # dan beri nilai default "Unknown Technique"
      fallback => "Unknown Technique"

      # Jangan hapus field sumber setelah translate
      remove_field => []
    }

    # --- Pemetaan Taktik MITRE ---
    # Contoh: rule ID "1000010" -> "Discovery"
    translate {
      field       => "[rule][id]"
      destination => "[mitre][tactic]"
      dictionary_path => "/etc/logstash/dictionaries/mitre-tactic.yml"

      fallback => "Unknown Tactic"
      remove_field => []
    }
  }

  # ===========================================================================
  # TAHAP 4: Klasifikasi Pyramid of Pain
  # ===========================================================================
  # Pyramid of Pain (David Bianco, 2013) mengklasifikasikan Indicator of
  # Compromise (IoC) berdasarkan tingkat kesulitan bagi penyerang untuk
  # mengubahnya. Semakin tinggi di piramida, semakin sulit untuk dihindari.
  #
  # Level (dari bawah ke atas):
  # 1. Hash Values       - Trivial bagi penyerang untuk diubah
  # 2. IP Addresses      - Mudah diubah (ganti VPN/proxy)
  # 3. Domain Names      - Sedikit lebih sulit (perlu registrasi baru)
  # 4. Network Artifacts - Memerlukan modifikasi tools
  # 5. Host Artifacts    - Memerlukan modifikasi signifikan
  # 6. Tools             - Harus mengganti/memodifikasi tools
  # 7. TTPs              - Paling sulit, harus mengubah perilaku
  #
  # Klasifikasi otomatis berdasarkan tipe field yang tersedia pada event.
  # ===========================================================================
  ruby {
    code => '
      # Inisialisasi level Pyramid of Pain
      pop_level = "Unknown"
      pop_description = "Tidak dapat diklasifikasikan"

      # Periksa tipe IoC yang tersedia dan tetapkan level
      # Urutan pengecekan dari level tertinggi ke terendah

      # Level 7: TTPs (Tactics, Techniques, and Procedures)
      # Jika ada pemetaan MITRE ATT&CK yang berhasil
      mitre_technique = event.get("[mitre][technique_name]")
      if mitre_technique && mitre_technique != "Unknown Technique"
        pop_level = "TTPs"
        pop_description = "Taktik, Teknik, dan Prosedur - Level tertinggi Pyramid of Pain"

      # Level 4: Network/Host Artifacts
      # Jika ada informasi rule/signature yang terdeteksi
      elsif event.get("[rule][name]")
        pop_level = "Network Artifacts"
        pop_description = "Artefak jaringan - Pola traffic yang teridentifikasi"

      # Level 3: Domain Names
      # Jika ada informasi domain/hostname sumber
      elsif event.get("[source][domain]") || event.get("[dns][question][name]")
        pop_level = "Domain Names"
        pop_description = "Nama domain - Memerlukan registrasi baru untuk menghindari deteksi"

      # Level 2: IP Addresses
      # Jika ada IP sumber (paling umum untuk log honeypot)
      elsif event.get("[source][ip]")
        pop_level = "IP Addresses"
        pop_description = "Alamat IP - Mudah diubah oleh penyerang"

      # Level 1: Hash Values
      # Jika ada hash file yang terdeteksi
      elsif event.get("[file][hash][sha256]") || event.get("[file][hash][md5]")
        pop_level = "Hash Values"
        pop_description = "Nilai hash - Trivial untuk diubah"
      end

      # Simpan hasil klasifikasi ke event
      event.set("[threat][pyramid_of_pain][level]", pop_level)
      event.set("[threat][pyramid_of_pain][description]", pop_description)
    '

    # Tag untuk menandai bahwa klasifikasi Pyramid of Pain sudah dilakukan
    add_tag => ["pop_classified"]
  }

  # ===========================================================================
  # TAHAP 5: Perhitungan Threat Score
  # ===========================================================================
  # Menghitung skor ancaman berdasarkan severity event.
  # Skor ini digunakan untuk prioritisasi alert dan trigger webhook SOAR.
  #
  # Skala severity Suricata:
  # - Severity 1 = Paling berbahaya (High)    -> Threat Score: 90-100
  # - Severity 2 = Berbahaya (Medium-High)     -> Threat Score: 70-89
  # - Severity 3 = Sedang (Medium)             -> Threat Score: 40-69
  # - Severity 4 = Rendah (Low)                -> Threat Score: 10-39
  #
  # Bonus skor diberikan jika:
  # - MITRE technique teridentifikasi (+10)
  # - GeoIP berhasil di-resolve (+5)
  # ===========================================================================
  ruby {
    code => '
      # Ambil severity dari event (default: 4 jika tidak ada)
      severity = event.get("[event][severity]")
      severity = severity.to_i rescue 4

      # Hitung base score berdasarkan severity
      # Severity 1 (paling tinggi) mendapat skor tertinggi
      case severity
      when 1
        base_score = 95
      when 2
        base_score = 75
      when 3
        base_score = 50
      when 4
        base_score = 20
      else
        base_score = 10
      end

      # Bonus skor untuk enrichment yang berhasil
      bonus = 0

      # +10 jika teknik MITRE berhasil diidentifikasi
      mitre = event.get("[mitre][technique_name]")
      if mitre && mitre != "Unknown Technique"
        bonus += 10
      end

      # +5 jika GeoIP berhasil di-resolve
      if event.get("[source][geo][country_name]")
        bonus += 5
      end

      # Total threat score (maksimum 100)
      total_score = [base_score + bonus, 100].min

      # Tentukan threat level berdasarkan total score
      threat_level = case total_score
        when 90..100 then "Critical"
        when 70..89  then "High"
        when 40..69  then "Medium"
        when 10..39  then "Low"
        else "Informational"
      end

      # Simpan hasil ke event
      event.set("[threat][score]", total_score)
      event.set("[threat][level]", threat_level)
      event.set("[threat][severity_original]", severity)
    '

    add_tag => ["threat_scored"]
  }

  # ===========================================================================
  # TAHAP 6: Parsing Timestamp
  # ===========================================================================
  # Memastikan field @timestamp di-parse dengan benar dari log asli.
  # Jika log mengandung field 'timestamp' dengan format ISO8601,
  # gunakan itu sebagai @timestamp resmi event.
  # ===========================================================================
  if [timestamp] {
    date {
      match => [
        "timestamp",
        "ISO8601",
        "yyyy-MM-dd'T'HH:mm:ss.SSSZ",
        "yyyy-MM-dd'T'HH:mm:ssZ",
        "yyyy-MM-dd HH:mm:ss",
        "MMM dd HH:mm:ss",
        "MMM  d HH:mm:ss"
      ]
      target => "@timestamp"

      # Timezone default jika tidak ada di log (WIB = UTC+7)
      timezone => "Asia/Jakarta"

      # Hapus field timestamp asli setelah di-parse
      remove_field => ["timestamp"]
    }
  }

  # ===========================================================================
  # PEMBERSIHAN FIELD
  # ===========================================================================
  # Hapus field metadata yang tidak diperlukan untuk menghemat storage
  # ===========================================================================
  mutate {
    remove_field => [
      "[agent][ephemeral_id]",
      "[agent][id]",
      "[ecs][version]",
      "[input][type]",
      "[log][offset]"
    ]
  }
}

# =============================================================================
# BAGIAN OUTPUT
# =============================================================================
# Event yang sudah diperkaya dikirim ke dua tujuan:
# 1. Elasticsearch - untuk penyimpanan, pencarian, dan visualisasi di Kibana
# 2. HTTP Webhook  - untuk notifikasi real-time ke SOAR Dashboard (hanya alert
#                    dengan severity tinggi, yaitu severity <= 2)
# =============================================================================
output {

  # ===========================================================================
  # OUTPUT 1: Elasticsearch
  # ===========================================================================
  # Menyimpan semua event ke index dengan pola nama 'cti-logs-iqbal-YYYY.MM.dd'.
  # Index Lifecycle Management (ILM) diaktifkan untuk manajemen retensi data
  # otomatis (hot -> warm -> delete sesuai ilm-policy.json).
  # ===========================================================================
  elasticsearch {
    hosts => ["http://127.0.0.1:9200"]

    # Autentikasi ke Elasticsearch
    user => "elastic"
    password => "${ES_PASSWORD}"

    # Pola nama index - menggunakan tanggal untuk rotasi harian
    index => "cti-logs-iqbal-%{+YYYY.MM.dd}"

    # Aktifkan Index Lifecycle Management untuk retensi otomatis
    ilm_enabled => true
    ilm_rollover_alias => "cti-logs-iqbal"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "cti-logs-policy"
  }

  # ===========================================================================
  # OUTPUT 2: HTTP Webhook ke SOAR Dashboard
  # ===========================================================================
  # Mengirim notifikasi real-time ke SOAR Dashboard (Flask) untuk alert
  # dengan severity TINGGI (severity <= 2, yaitu severity 1 dan 2).
  #
  # Kondisi: hanya dikirim jika [event][severity] bernilai 1 atau 2
  # Ini mencegah SOAR Dashboard dibanjiri oleh alert severity rendah.
  #
  # Endpoint: http://127.0.0.1:5000/webhook (lokal, tidak perlu autentikasi)
  # Format: JSON dengan informasi ringkasan alert
  # ===========================================================================
  if [event][severity] and [event][severity] <= 2 {
    http {
      url => "http://127.0.0.1:5000/webhook"
      http_method => "post"
      format => "json"
      content_type => "application/json"

      # Mapping field yang dikirim ke webhook
      mapping => {
        "timestamp"        => "%{@timestamp}"
        "source_ip"        => "%{[source][ip]}"
        "destination_ip"   => "%{[destination][ip]}"
        "destination_port" => "%{[destination][port]}"
        "rule_name"        => "%{[rule][name]}"
        "rule_id"          => "%{[rule][id]}"
        "severity"         => "%{[event][severity]}"
        "threat_score"     => "%{[threat][score]}"
        "threat_level"     => "%{[threat][level]}"
        "mitre_technique"  => "%{[mitre][technique_name]}"
        "mitre_tactic"     => "%{[mitre][tactic]}"
        "country"          => "%{[source][geo][country_name]}"
        "pop_level"        => "%{[threat][pyramid_of_pain][level]}"
      }

      # Retry dan timeout settings
      # Jika SOAR Dashboard sedang down, jangan sampai blocking pipeline
      connect_timeout => 5
      request_timeout => 10
      retry_failed => false

      # Abaikan error jika webhook tidak tersedia
      # Pipeline tetap berjalan meskipun SOAR Dashboard offline
    }
  }

  # ===========================================================================
  # OUTPUT 3: Debugging (Opsional - uncomment untuk troubleshooting)
  # ===========================================================================
  # Tampilkan event yang diproses ke stdout untuk debugging.
  # PERINGATAN: Jangan aktifkan di production karena akan membanjiri log!
  # ===========================================================================
  # stdout {
  #   codec => rubydebug
  # }
}
