# =============================================================================
# Dictionary MITRE ATT&CK - Nama Teknik
# =============================================================================
# File    : mitre-name.yml
# Lokasi  : /etc/logstash/dictionaries/mitre-name.yml
# Fungsi  : Pemetaan Rule ID (Suricata/Snort) ke nama teknik MITRE ATT&CK
#
# Format  : "rule_id": "Nama Teknik MITRE"
#
# Cara menambahkan mapping baru:
# 1. Identifikasi rule ID dari Suricata/Snort yang ingin dipetakan
# 2. Cari teknik MITRE ATT&CK yang sesuai di https://attack.mitre.org/
# 3. Tambahkan baris baru dengan format: "rule_id": "Technique Name"
#
# Referensi: https://attack.mitre.org/techniques/
# =============================================================================

# --- Suricata Custom Rules (1000xxx) ---
"1000010": "Network Service Discovery"
"1000020": "Password Guessing"
"1000030": "Vulnerability Scanning"

# --- Emerging Threats / ET Rules (2xxxxxx) ---
"2200074": "Network Service Discovery"
"2013504": "Network Service Discovery"
"2200121": "Password Guessing"
"2001219": "Application Layer Protocol"
