# =============================================================================
# Konfigurasi Fail2Ban - CTI Honeypot
# Penempatan: /etc/fail2ban/jail.d/honeypot.conf
# =============================================================================
#
# CATATAN PENTING:
# Threshold (maxretry) sengaja ditinggikan menjadi 10 karena server ini
# berfungsi sebagai honeypot. Tujuannya adalah agar percobaan serangan
# (terutama brute-force SSH) sempat tercatat secara lengkap oleh:
#   - Suricata NIDS (melalui rule SID 1000020)
#   - Wazuh Agent (melalui analisis auth.log)
# sebelum IP penyerang akhirnya diblokir oleh fail2ban.
#
# Jika threshold terlalu rendah, data serangan yang terekam akan terlalu
# sedikit untuk analisis Cyber Threat Intelligence (CTI) yang bermakna.
#
# Ban time juga relatif singkat (600 detik / 10 menit) agar penyerang
# berpotensi kembali dan menghasilkan lebih banyak data untuk analisis.
# =============================================================================

[sshd]
enabled  = true
port     = ssh
filter   = sshd
logpath  = /var/log/auth.log
# Izinkan hingga 10 percobaan login gagal sebelum ban
maxretry = 10
# Durasi ban: 10 menit (600 detik)
bantime  = 600
# Jendela waktu pengamatan: 10 menit
findtime = 600

[nginx-http-auth]
enabled  = true
port     = http,https
filter   = nginx-http-auth
logpath  = /var/log/nginx/error.log
# Threshold sama dengan SSH — konsisten untuk pengumpulan data honeypot
maxretry = 10
bantime  = 600
findtime = 600
