input {
  beats {
    port => 5044
  }
}

filter {

  ####################################################################
  # TIME PARSER
  ####################################################################
  date {
    match => [ "@timestamp", "ISO8601" ]
  }

  ####################################################################
  # WAZUH JSON PARSER
  ####################################################################

  ### >>> WAZUH ACTIVE-RESPONSE (firewall-drop) -> T2/MTTR <<<
  if [log_type] == "wazuh-ar" {
    grok {
      match => { "message" => "^(?<ar_exec_time>%{YEAR}/%{MONTHNUM}/%{MONTHDAY} %{TIME}) %{NOTSPACE:ar_prog}: %{GREEDYDATA:ar_json}" }
      tag_on_failure => ["_ar_grokfail"]
    }
    if [ar_json] and [ar_json] =~ /"command":"add"/ {
      json { source => "ar_json" target => "ar" }
      mutate {
        add_field => {
          "[rule][description]" => "Host Blocked by firewall-drop Active Response"
          "[data][srcip]" => "%{[ar][parameters][alert][data][srcip]}"
          "[source][ip]" => "%{[ar][parameters][alert][data][srcip]}"
          "[event_type]" => "active_response"
        }
      }
      date { match => [ "ar_exec_time", "yyyy/MM/dd HH:mm:ss" ] timezone => "Asia/Jakarta" target => "@timestamp" }
      mutate { remove_field => [ "message", "ar_json", "ar", "ar_prog", "ar_exec_time" ] }
    } else {
      drop {}
    }
  }
  ### <<< END WAZUH ACTIVE-RESPONSE >>>

  if [service][type] == "wazuh" or [fields][log_type] == "wazuh-alerts" {

    mutate {
    remove_field => [ "[predecoder][timestamp]" ]
  }

  mutate { remove_field => [ "[predecoder][timestamp]" ] }
  json {
      source => "message"
      target => "wazuh"
    }

    mutate {
      remove_field => ["message"]
    }
  }

  ####################################################################
  # DROP SURICATA STATS
  ####################################################################
  if [event_type] == "stats" {
    drop {}
  }

  if [suricata][eve][event_type] == "stats" {
    drop {}
  }

  ####################################################################
  # SURICATA JSON PARSER
  ####################################################################
 # Parse JSON dari Wazuh / Suricata

if [event][original] {

  mutate {
    remove_field => [ "[predecoder][timestamp]" ]
  }

  mutate { remove_field => [ "[predecoder][timestamp]" ] }
  json {
    source => "[event][original]"
  }

}
  ####################################################################
  # ENSURE SOURCE IP FOR SOAR
  ####################################################################
  if ![source][ip] {
    if [wazuh][data][srcip] {
      mutate { copy => { "[wazuh][data][srcip]" => "[source][ip]" } }
    } else if [data][srcip] {
      mutate { copy => { "[data][srcip]" => "[source][ip]" } }
    } else if [wazuh][data][alert][srcip] {
      mutate { copy => { "[wazuh][data][alert][srcip]" => "[source][ip]" } }
    } else if [alert][src_ip] {
      mutate { copy => { "[alert][src_ip]" => "[source][ip]" } }
    } else if [suricata][eve][src_ip] {
      mutate { copy => { "[suricata][eve][src_ip]" => "[source][ip]" } }
    } else {
      mutate { add_field => { "[source][ip]" => "Unknown" } }
    }
  }

  ####################################################################
  # GEOIP ENRICHMENT
  ####################################################################
  if [source][ip] and [source][ip] != "Unknown" {
    geoip {
      source => "[source][ip]"
      target => "source"
    }
  }
  
  ####################################################################
  ##### DROP NOISE: Suricata STREAM/decoder anomalies (trafik manajemen) #####
  if [alert][signature] =~ /(?i)stream/ or [wazuh][full_log] =~ /(?i)stream/ or [data][alert][signature] =~ /(?i)stream/ {
    drop {}
  }
  ##### NORMALIZE eve alert.* -> data.alert.* (agar query orchestrator cocok) #####
  if [alert][signature_id] and ![data][alert][signature_id] {
    mutate { copy => { "[alert][signature_id]" => "[data][alert][signature_id]" "[alert][signature]" => "[data][alert][signature]" } }
  }

  # EXTRACT SIGNATURE ID
  ####################################################################
  if [wazuh][data][alert][signature_id] {
    mutate { add_field => { "[@metadata][sig_id_str]" => "%{[wazuh][data][alert][signature_id]}" } }
  } else if [rule][id] {
    mutate { add_field => { "[@metadata][sig_id_str]" => "%{[rule][id]}" } }
  } else if [alert][signature_id] {
    mutate { add_field => { "[@metadata][sig_id_str]" => "%{[alert][signature_id]}" } }
  } else if [suricata][eve][alert][signature_id] {

    mutate {
      add_field => {
        "[@metadata][sig_id_str]" => "%{[suricata][eve][alert][signature_id]}"
      }
    }

  }
# ============================================================
# MITRE ATT&CK Enricher
# ============================================================
if [@metadata][sig_id_str] {

  mutate {
    add_field => {
      # removed
    }
  }

  translate {
    source => "[@metadata][sig_id_str]"
    target => "[mitre][technique_id]"
    dictionary_path => "/etc/logstash/dictionaries/mitre-mapping.yml"
    fallback => "Unmapped"
  }

  translate {
    source => "[mitre][technique_id]"
    target => "[mitre][technique_name]"
    dictionary_path => "/etc/logstash/dictionaries/mitre-id-to-name.yml"
    fallback => "Unmapped"
  }

  translate {
    source => "[mitre][technique_id]"
    target => "[mitre][tactic]"
    dictionary_path => "/etc/logstash/dictionaries/mitre-tactic.yml"
    fallback => "Unmapped"
  }

}
  ####################################################################
  # PYRAMID OF PAIN CLASSIFIER
  ####################################################################
 if [mitre][technique_id] and [mitre][technique_id] != "Unmapped" {

  mutate {
    add_field => {
      "[pyramid][layer]" => "TTPs"
    }
  }

} else if [data][alert][signature] =~ /(?i)(hydra|metasploit|sqlmap|nmap|scan|ssh|brute force)/ {

  mutate {
    add_field => {
      "[pyramid][layer]" => "Tools"
    }
  }

  } else {

    mutate {
      add_field => {
        "[pyramid][layer]" => "IP_Address"
      }
    }

  }


  # --- SOAR NORMALIZATION ---
  if [@metadata][sig_id_str] {
    mutate {
      add_field => {
        "[soar][attack_type]" => "Unknown Signature"
        "[soar][severity]" => "0"
        "[soar][mitre_technique]" => "Unmapped"
        "[soar][mitre_status]" => "Unmapped"
      }
    }
    
    if [wazuh][data][alert][signature] {
      mutate { replace => { "[soar][attack_type]" => "%{[wazuh][data][alert][signature]}" } }
    } else if [data][alert][signature] {
      mutate { replace => { "[soar][attack_type]" => "%{[data][alert][signature]}" } }
    } else if [rule][description] {
      mutate { replace => { "[soar][attack_type]" => "%{[rule][description]}" } }
    } else if [alert][signature] {
      mutate { replace => { "[soar][attack_type]" => "%{[alert][signature]}" } }
    } else if [suricata][eve][alert][signature] {
      mutate { replace => { "[soar][attack_type]" => "%{[suricata][eve][alert][signature]}" } }
    }
    
    if [wazuh][data][rule][level] {
      mutate { replace => { "[soar][severity]" => "%{[wazuh][data][rule][level]}" } }
    } else if [rule][level] {
      mutate { replace => { "[soar][severity]" => "%{[rule][level]}" } }
    } else if [alert][severity] {
      mutate { replace => { "[soar][severity]" => "%{[alert][severity]}" } }
    } else if [suricata][eve][alert][severity] {
      mutate { replace => { "[soar][severity]" => "%{[suricata][eve][alert][severity]}" } }
    }

    if [mitre][technique_name] and [mitre][technique_name] != "Unmapped" {
      mutate {
        replace => { 
          "[soar][mitre_technique]" => "%{[mitre][technique_name]}" 
          "[soar][mitre_status]" => "Mapped"
        }
      }
    }
  }


  ####################################################################
  # RESEARCH ENRICHMENT — real-time ke cti-research-alerts-iqbal
  ####################################################################
  # Normalisasi sig_id_str: Filebeat+Logstash double-parse bikin array
  if [@metadata][sig_id_str] {
    ruby {
      code => 'v = event.get("[@metadata][sig_id_str]"); v = v.first if v.is_a?(Array); event.set("[@metadata][sig_id_str]", v.to_s)'
    }
  }
  if [@metadata][sig_id_str] == "1000010" or [@metadata][sig_id_str] == "1000020" or [@metadata][sig_id_str] == "1000030" {
    if [@metadata][sig_id_str] == "1000010" {
      mutate {
        add_field => {
          "[research][attack_type]" => "nmap"
          "[research][scenario]"    => "Port Scanning T1046"
        }
      }
    } else if [@metadata][sig_id_str] == "1000020" {
      mutate {
        add_field => {
          "[research][attack_type]" => "hydra"
          "[research][scenario]"    => "SSH Brute Force T1110.001"
        }
      }
    } else if [@metadata][sig_id_str] == "1000030" {
      mutate {
        add_field => {
          "[research][attack_type]" => "nikto"
          "[research][scenario]"    => "Web Scanning T1595.002"
        }
      }
    }
    mutate {
      add_field => { "[@metadata][is_research]" => "true" }
    }
  }

}   # PENUTUP FILTER

output {
  ####################################################################
  # ELASTICSEARCH OUTPUT
  ####################################################################
  elasticsearch {

    hosts => ["https://192.168.56.10:9200"]

    user => "elastic"

    password => "${ELASTIC_PASS}"

    ssl_enabled => true

    ssl_certificate_authorities => [
      "/etc/logstash/certs/http_ca.crt"
    ]

    ssl_verification_mode => "none"

    index => "cti-logs-iqbal-%{+YYYY.MM.dd}"
  }

  # --- SOAR HTTP WEBHOOK (hanya research alerts, cegah pipeline stall) ---
  if [@metadata][is_research] == "true" {
    http {
      url => "http://127.0.0.1:5000/webhook"
      http_method => "post"
      format => "json"
      mapping => {
        "timestamp_alert" => "%{[@timestamp]}"
        "src_ip" => "%{[source][ip]}"
        "attack_type" => "%{[soar][attack_type]}"
        "severity" => "%{[soar][severity]}"
        "mitre_technique" => "%{[soar][mitre_technique]}"
        "mitre_status" => "%{[soar][mitre_status]}"
        "pipeline_source" => "logstash_http"
      }
    }
  }


  # --- RESEARCH REAL-TIME OUTPUT ---
  if [@metadata][is_research] == "true" {
    elasticsearch {
      hosts => ["https://192.168.56.10:9200"]
      user => "elastic"
      password => "${ELASTIC_PASS}"
      ssl_enabled => true
      ssl_certificate_authorities => ["/etc/logstash/certs/http_ca.crt"]
      ssl_verification_mode => "none"
      index => "cti-research-alerts-iqbal"
      action => "index"
    }
  }

}
