# =========================================================================
# LOGSTASH WEBHOOK OUTPUT CONFIGURATION
# =========================================================================
# CATATAN: File ini jangan menimpa konfigurasi yang sudah ada!
# Silakan BUKA file /etc/logstash/conf.d/soc-pipeline.conf di SOC Server,
# lalu tambahkan (sisipkan) blok HTTP output ini ke bagian akhir file, 
# persis di dalam blok output { ... } yang sudah ada.

# Blok tambahan untuk dikopi:

output {
  # ... (biarkan konfigurasi elasticsearch yang sudah ada) ...

  # Tambahan untuk Webhook SOAR Dashboard (Hanya teruskan alert berisiko)
  if [alert][severity] <= 2 {
    http {
      url => "http://127.0.0.1:5000/webhook"
      http_method => "post"
      format => "json"
    }
  }
}
